apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-multi-container-logger
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-multi-container-logger
  template:
    metadata:
      labels:
        app: python-multi-container-logger
    spec:

      # -----------------
      # INIT CONTAINERS
      # -----------------
      initContainers:
        - name: init-logger-1
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              python - <<EOF
              import time
              print("Init Container 1 starting...")
              time.sleep(3)
              print("Init Container 1 completed.")
              EOF

        - name: init-logger-2
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              python - <<EOF
              import time
              print("Init Container 2 starting...")
              time.sleep(3)
              print("Init Container 2 completed.")
              EOF

      # -----------------
      # MAIN CONTAINERS
      # -----------------
      containers:
        - name: python-logger-1
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              python - <<EOF
              import logging, random, time
              logging.basicConfig(level=logging.DEBUG,
                                  format="%(asctime)s - %(levelname)s - [C1] - %(message)s")
              levels = [logging.error, logging.info, logging.debug, logging.warning]
              messages = ["Error occurred", "Processing", "Debug info", "Warning detected"]

              while True:
                  log_func = random.choice(levels)
                  msg = random.choice(messages)
                  log_func(msg)
                  print(f"[C1 PRINT] {msg}")
                  time.sleep(2)
              EOF

        - name: python-logger-2
          image: python:3.11-slim
          command: ["/bin/sh", "-c"]
          args:
            - |
              python - <<EOF
              import logging, random, time
              logging.basicConfig(level=logging.DEBUG,
                                  format="%(asctime)s - %(levelname)s - [C2] - %(message)s")
              levels = [logging.error, logging.info, logging.debug, logging.warning]
              messages = ["Failure happened", "Handling request", "Trace detail", "Possible issue"]

              while True:
                  log_func = random.choice(levels)
                  msg = random.choice(messages)
                  log_func(msg)
                  print(f"[C2 PRINT] {msg}")
                  time.sleep(2)
              EOF